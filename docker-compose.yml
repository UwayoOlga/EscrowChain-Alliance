version: '3.8'

services:
  escrow-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-escrow_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
      POSTGRES_DB: ${DB_NAME:-escrowchain_db}
    ports:
      - "5432:5432"
    volumes:
      - escrow-db-data:/var/lib/postgresql/data

  escrow-backend:
    build: 
      context: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_USER=${DB_USER:-escrow_admin}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - DB_NAME=${DB_NAME:-escrowchain_db}
      - DB_HOST=escrow-db
      - DB_PORT=5432
      - SESSION_SECRET=${SESSION_SECRET:-production_secure_secret}
    depends_on:
      - escrow-db
    volumes:
      - ./backend/uploads:/app/uploads

  escrow-frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - escrow-backend

volumes:
  escrow-db-data:
