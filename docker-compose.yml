version: '3.9'

services:

  # Database service
  postgres:
    image: postgres:16-alpine
    container_name: escrowchain_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: escrowchain
      POSTGRES_PASSWORD: escrowchain_secret
      POSTGRES_DB: escrowchain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrowchain -d escrowchain_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: escrowchain_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-change_me_to_a_random_string}
      DATABASE_URL: postgresql://escrowchain:escrowchain_secret@postgres:5432/escrowchain_db
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-"EscrowChain Alliance" <no-reply@escrowchain.rw>}
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      # Persist uploaded property images across restarts
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"

  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BLOCKFROST_PROJECT_ID: ${VITE_BLOCKFROST_PROJECT_ID:-}
    container_name: escrowchain_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
